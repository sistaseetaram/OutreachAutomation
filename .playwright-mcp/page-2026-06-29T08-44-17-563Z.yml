        - paragraph [ref=e79]:
          - text: "Here is the brief for a real 3BHK. A list of forwarded WhatsApp messages: - \"Loft in utility.\" - \"Pooja room as per vastu.\" - \"Study in the children's bedroom.\" - \"Vanity near the wash basin.\" - \"Shoe rack.\" No form. No structured doc. Half the details were never written down. The rest is left to the designer to imagine. I ran it through the system I'm building. It fills the gaps the way a good designer would—handling vastu (traditional spatial geometry based on solar alignment and wind patterns), circulation, standard layouts—and turns the wants into structured schedules in minutes. Here are the real specifics of this run: - 3BHK · East-facing · 2100 sq ft · ₹15L interior budget. - Material & Lighting Schedules published directly to Google Sheets. - A BOQ Draft with real quantities. - FF&E sourcing sheet and auto-written elevation render prompts. Honest line: The BOQ is left blank in some fields on purpose. A physical site measure is always required before ordering. And we didn't generate the final render today—the AI kept sliding the furniture off the plan (we'll show how we're working through it tomorrow). It is a first draft, not a final. They revise from there. Not replacing anyone. Just getting to the first draft in an afternoon, not a fortnight. Building in the open. Run a design or architecture practice? Message me—I want to test it on real work."
